<!DOCTYPE html>
<html>
<head>
    <title>Gynecological Disease Diagnosis</title>
    <style>
        /* Body styling */
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #E6E6FA, #F8F0FF); /* Lavender to soft pink */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        /* Container card */
        .container {
            background-color: #ffffff;
            padding: 45px 35px;
            border-radius: 20px;
            box-shadow: 0 12px 25px rgba(138, 43, 226, 0.2);
            max-width: 500px;
            width: 100%;
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .container:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(138, 43, 226, 0.3);
        }

        /* Heading */
        h2 {
            color: #6A5ACD;
            margin-bottom: 30px;
            font-size: 30px;
            letter-spacing: 1px;
        }

        /* File input */
        input[type="file"] {
            padding: 12px;
            margin: 15px 0;
            border-radius: 12px;
            border: 1px solid #D8BFD8;
            width: 100%;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        input[type="file"]:hover {
            border-color: #BA55D3;
            box-shadow: 0 4px 8px rgba(138, 43, 226, 0.2);
        }

        /* Submit button */
        button {
            padding: 14px 30px;
            border-radius: 50px;
            border: none;
            background: linear-gradient(90deg, #9370DB, #BA55D3);
            color: white;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 15px;
        }
        button:hover {
            background: linear-gradient(90deg, #BA55D3, #9370DB);
            transform: translateY(-3px);
            box-shadow: 0 6px 18px rgba(138, 43, 226, 0.3);
        }

        /* Responsive */
        @media (max-width: 600px) {
            .container {
                padding: 35px 20px;
            }
            h2 {
                font-size: 26px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>🩺 Upload Medical Image</h2>
        <form method="POST" action="/predict" enctype="multipart/form-data">
            <input type="file" name="file" required><br>
            <button type="submit">Predict</button>
        </form>
    </div>
</body>
</html>
