<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Genetic Risk | GyneCare</title>

    <!-- Font Awesome for back arrow -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f8f0ff;
            margin: 0;
            padding: 0;
        }

        /* Top bar */
        .top-bar {
            padding: 20px 40px;
            display: flex;
            align-items: center;
        }

        .back-btn {
            text-decoration: none;
            color: #6a1b9a;
            font-size: 20px;
            margin-right: 15px;
        }

        .title {
            font-size: 24px;
            font-weight: bold;
            color: #6a1b9a;
        }

        /* Card */
        .card {
            background: white;
            max-width: 650px;
            margin: 30px auto;
            padding: 35px;
            border-radius: 18px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }

        h2 {
            color: #6a1b9a;
            margin-bottom: 20px;
        }

        label {
            font-weight: bold;
            margin-top: 15px;
            display: block;
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            border-radius: 10px;
            border: 1px solid #d1b3ff;
        }

        button {
            margin-top: 25px;
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 25px;
            background: linear-gradient(to right, #8e24aa, #ba68c8);
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        /* Result box */
        .result {
            margin-top: 25px;
            padding: 18px;
            border-radius: 12px;
            background: #f3e5f5;
            color: #4a148c;
            font-weight: bold;
        }
    </style>
</head>

<body>

<!-- Top bar with back arrow -->
<div class="top-bar">
    <a href="{{ url_for('routes.dashboard') }}" class="back-btn">
        <i class="fas fa-arrow-left"></i>
    </a>
    <div class="title">GyneCare</div>
</div>

<!-- Main Card -->
<div class="card">
    <h2>🧬 Genetic Risk Assessment</h2>

    <form method="POST">
        <label>Age</label>
        <input type="number" name="age" required>

        <label>Family History of Gynecological Disease?</label>
        <select name="family_history">
            <option value="no">No</option>
            <option value="yes">Yes</option>
        </select>

        <label>Lifestyle</label>
        <select name="lifestyle">
            <option value="healthy">Healthy</option>
            <option value="moderate">Moderate</option>
            <option value="unhealthy">Unhealthy</option>
        </select>

        <button type="submit">Calculate Risk</button>
    </form>

    <!-- Prediction result -->
    {% if risk %}
        <div class="result">
            Predicted Genetic Risk Level: {{ risk }}
        </div>
    {% endif %}
</div>

</body>
</html>
