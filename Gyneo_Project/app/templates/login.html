<!DOCTYPE html>
<html>
<head>
    <title>Login - Gynae Diagnosis</title>
    <style>
        body {
            font-family: 'Arial', sans-serif';
            background: linear-gradient(135deg, #E6E6FA, #F8F0FF);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background: #ffffff;
            padding: 40px 35px;
            border-radius: 20px;
            box-shadow: 0 12px 25px rgba(138, 43, 226, 0.2);
            width: 320px;
            text-align: center;
        }
        h2 {
            color: #6A5ACD;
            margin-bottom: 25px;
            font-size: 28px;
        }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 12px;
            border: 1px solid #D8BFD8;
            outline: none;
            transition: .2s;
        }
        input[type="text"]:focus, input[type="password"]:focus {
            border-color: #BA55D3;
            box-shadow: 0 0 8px rgba(138, 43, 226, 0.2);
        }
        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 50px;
            background: linear-gradient(90deg, #9370DB, #BA55D3);
            color: white;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s ease;
        }
        button:hover {
            background: linear-gradient(90deg, #BA55D3, #9370DB);
            transform: translateY(-3px);
            box-shadow: 0 6px 18px rgba(138, 43, 226, 0.3);
        }
        .flash {
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
            font-size: 14px;
        }
        .flash-success { background: #d4edda; color: #155724; }
        .flash-danger { background: #f8d7da; color: #721c24; }
        .flash-info   { background: #d1ecf1; color: #0c5460; }

        a {
            text-decoration: none;
            color: #6A5ACD;
            font-size: 14px;
        }
    </style>
</head>
<body>
<div class="container">

    <h2>Login</h2>

    <!-- Flash messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="flash flash-{{ category }}">{{ message }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form method="POST">
        <input type="text" name="username" placeholder="Username" required><br>
        <input type="password" name="password" placeholder="Password" required><br>
        <button type="submit">Login</button>
    </form>

    <p>Don't have an account?
        <a href="{{ url_for('auth.register') }}">Register</a>
    </p>

</div>
</body>
</html>
