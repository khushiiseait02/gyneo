<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upload Scan - Gynecare</title>

  <style>
    body {
      font-family: 'Poppins', 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #f9c5d1, #fddde6, #e6c9ff);
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      background: #ffffff;
      border-radius: 25px;
      box-shadow: 0 10px 30px rgba(123, 67, 163, 0.2);
      width: 420px;
      padding: 35px 30px;
      text-align: center;
    }

    h2 {
      color: #7b43a3;
      margin-bottom: 25px;
      font-weight: 600;
    }

    input[type="file"] {
      display: block;
      margin: 20px auto;
      padding: 12px;
      width: 90%;
      border-radius: 12px;
      border: 1px solid #e5c3e8;
      background: #fcf7ff;
      cursor: pointer;
    }

    button {
      background: linear-gradient(90deg, #ff6f9f, #7b43a3);
      color: white;
      border: none;
      padding: 14px 30px;
      border-radius: 30px;
      font-size: 16px;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      margin-top: 10px;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 15px rgba(123, 67, 163, 0.3);
    }

    a {
      display: inline-block;
      margin-top: 25px;
      color: #7b43a3;
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
    }

    a:hover {
      text-decoration: underline;
    }

    .note {
      margin-top: 15px;
      font-size: 13px;
      color: #8c859d;
    }
  </style>
</head>

<body>
  <div class="container">
    <h2>🩺 Upload Diagnostic Image</h2>

    <form action="{{ url_for('routes.predict') }}" method="POST" enctype="multipart/form-data">
      <input type="file" name="file" required>
      <button type="submit">🔍 Analyze Image</button>
    </form>

    <p class="note">
      Supported scans: Ultrasound, MRI, Medical images
    </p>

    <a href="{{ url_for('routes.dashboard') }}">← Back to Dashboard</a>
  </div>
</body>
</html>
