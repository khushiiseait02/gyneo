<!DOCTYPE html>
<html>
<head>
  <title>Diagnosis Result - Gynecare</title>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #e6eef5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }
    .container {
      background-color: #ffffff;
      padding: 40px 30px;
      border-radius: 15px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.1);
      max-width: 600px;
      width: 100%;
      text-align: center;
    }
    h2 {
      color: #0f1c3a;
      margin-bottom: 25px;
    }
    img {
      max-width: 350px;
      border-radius: 10px;
      margin-bottom: 25px;
      border: 2px solid #00aaff;
    }
    p { font-size: 18px; margin: 10px 0; color: #333; }
    .alert { color: red; font-weight: bold; margin-top: 10px; }
    a {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 25px;
      background: #00aaff;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      transition: 0.3s;
    }
    a:hover {
      background: #0088cc;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>🩺 Diagnosis Result</h2>
    <img src="{{ url_for('static', filename='uploads/' + filename) }}" alt="Uploaded Image"><br>
    <p><b>Prediction:</b> {{ prediction }}</p>
    <p><b>Confidence:</b> {{ confidence }}%</p>
    <p class="alert">{{ alert }}</p>
    <a href="{{ url_for('routes.upload') }}">🔄 Upload Another Image</a>
    <a href="{{ url_for('routes.dashboard') }}">🏠 Go to Dashboard</a>
  </div>
</body>
</html>
